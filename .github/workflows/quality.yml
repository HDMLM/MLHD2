name: Quality

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-lint-type:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff mypy pre-commit

      - name: Ruff lint
        run: ruff check tests core/data_manager.py core/dynamic_icons.py core/embed_utils.py core/webhook_client.py core/logging_config.py core/diagnostics.py

      - name: Ruff format check
        run: ruff format --check tests core/data_manager.py core/dynamic_icons.py core/embed_utils.py core/webhook_client.py core/logging_config.py core/diagnostics.py

      - name: Mypy
        run: mypy

      - name: Pytest
        run: pytest -q tests
