name: Publish approved reviews

on:
  issues:
    types: [opened, edited, labeled, unlabeled, reopened, closed]
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  issues: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build data/reviews.json from approved issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            function parseSections(body) {
              const text = String(body || '');
              const sections = {};
              const re = /###\s*(.+?)\n+([\s\S]*?)(?=\n###\s*|$)/g;
              let m;
              while ((m = re.exec(text)) !== null) {
                sections[m[1].toLowerCase().trim()] = m[2].trim();
              }
              return sections;
            }

            function getLabelNames(labels) {
              return (labels || []).map((label) =>
                typeof label === 'string' ? label : (label.name || '')
              );
            }

            function parseRating(issue, sections) {
              const labelNames = getLabelNames(issue.labels);
              const ratingLabel = labelNames.find((name) => /^(1|2|3|4|5)$/.test(name));
              if (ratingLabel) return Number(ratingLabel);

              const sectionKey = Object.keys(sections).find((key) => key.startsWith('rating'));
              if (sectionKey) {
                const value = Number(String(sections[sectionKey]).match(/[1-5]/)?.[0] || 0);
                if (value >= 1 && value <= 5) return value;
              }

              return 0;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'all',
              labels: 'review,Approved',
              per_page: 100,
            });

            const reviews = issues
              .filter((issue) => !issue.pull_request)
              .map((issue) => {
                const sections = parseSections(issue.body || '');
                const rating = parseRating(issue, sections);
                const name = (sections['display name'] || issue.user?.login || 'Anonymous').trim();
                const message = (sections['review'] || issue.body || '').trim();
                const title = String(issue.title || 'Review').replace(/^\[Review\]:\s*/i, '').trim();

                return {
                  id: `gh-${issue.id}`,
                  number: issue.number,
                  name,
                  title,
                  message,
                  rating,
                  date: issue.created_at,
                  url: issue.html_url,
                };
              })
              .filter((item) => item.rating >= 1 && item.rating <= 5 && item.message.length > 0)
              .sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime());

            const payload = {
              generatedAt: new Date().toISOString(),
              source: `${owner}/${repo}`,
              count: reviews.length,
              items: reviews,
            };

            const outDir = path.join(process.cwd(), 'data');
            const outFile = path.join(outDir, 'reviews.json');
            fs.mkdirSync(outDir, { recursive: true });
            fs.writeFileSync(outFile, JSON.stringify(payload, null, 2) + '\n');
            core.info(`Wrote ${outFile} with ${reviews.length} approved review(s).`);

      - name: Commit updated reviews.json
        run: |
          if git diff --quiet -- data/reviews.json; then
            echo "No review data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/reviews.json
          git commit -m "chore: publish approved reviews"
          git push
